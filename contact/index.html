<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

    <link rel="stylesheet" href="/style.css" type="text/css">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>
<body class="">
    <header class="page-header">
        <div class="header-content">
        <div class="header-left">
            <div class="cell cell-top">
            <!-- Top-left content: text and/or image -->
            <div class="title">
                    <div><a href="/">mrozanski</a></div>
                    <div class="site-name"><a href="/"><span class="first-cap">B</span>uild<span class="end-cap">LOG</span></a></div>
                </div>
            </div>
            <div class="border-line border-between-left" aria-hidden="true"></div>
            <div class="cell cell-bottom">
            <!-- Bottom-left content -->
            <p class="site-subtitle">Real projects where I use code, agents, and product thinking to ship faster</p>
            </div>
        </div>

        <div class="header-right">
            <!--div class="border-line border-top-right" aria-hidden="true"></div-->
            <div class="cell cell-top">
            <!-- Top-right content -->
            <ul class="menu">
                        <li class="menu-item"><a href="/about/">about</a></li>
                        <li class="menu-item"><a href="/posts/">posts</a></li>
                        <li class="menu-item"><a href="/contact/">contact</a></li>
                    </ul>
            </div>
            <div class="cell cell-bottom">
            <!-- Bottom-right content (taller) -->
            <img src="/avatar.png" alt="Author avatar" class="avatar">
            </div>
        </div>
        </div>
    </header>
    

    <main>
        

        <div class="content main-container">
            <form
  id="contact-form"
  action="https://formspree.io/f/xreapabn"
  method="POST"
  class="contact-form"
>
  <label>
    Your email:
    <input type="email" name="email" required>
  </label>
  <label>
    Your message:
    <textarea name="message" rows="10" required></textarea>
  </label>
  <p id="form-status" class="form-status" aria-live="polite"></p>
  <button type="submit">Send</button>
</form>
<script>
(function() {
  const form = document.getElementById('contact-form');
  const status = document.getElementById('form-status');

  if (!form || !status) return;

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    status.textContent = 'Sending...';
    status.className = 'form-status form-status--sending';

    try {
      const response = await fetch(form.action, {
        method: form.method,
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      });

      const data = await response.json();

      if (response.ok) {
        status.textContent = 'Thanks for your message. I\'ll get back to you soon.';
        status.className = 'form-status form-status--success';
        form.reset();
      } else {
        if (data.errors) {
          status.textContent = data.errors.map(err => err.message).join(', ');
        } else {
          status.textContent = 'Something went wrong. Please try again.';
        }
        status.className = 'form-status form-status--error';
      }
    } catch (err) {
      status.textContent = 'Something went wrong. Please try again.';
      status.className = 'form-status form-status--error';
    }
  });
})();
</script>
        </div>
    </main>

    <footer>
        <div class="wide-container">
            <div class="join-cta">
                <ul>
                    <li><a href="/contact" aria-label="Contact Form">Contact</a></li>
                    <li><a href="https://github.com/mrozanski" target="_blank" aria-label="GitHub">GitHub</a></li>
                    <li><a href="/rss.xml" aria-label="RSS">RSS</a></li>
                </ul>
            </div>
        </div>
    </footer>
</body>
</html>
